<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Rank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="inputPage" class="">
        <div class="header">
            <h1>BLIND RANK</h1>
            <h3>Your <span class="italics">blind ranking</span></h3>
            <h3>Your <span class="italics">way</span></h3>
            <!-- <button>Need Rank Ideas?</button> -->
        </div>
        <div id="inputBox">
            <form id="rankForm">
                <h4>First create a pool to rank from by entering items separated by a comma</h4>
                <textarea placeholder="Billie Jean, Thriller, Beat It, Smooth Criminal, Man In the Mirror, Bad..." name="rankInput" id="rankInput"></textarea>
                <h4>Next enter how many items you want to blind rank (cannot exceed pool size)</h4>
                <input type="number" id="numberInput">
                <button id="submitButton" type="submit">Rank These Items</button>
            </form>
            <div id="footer">© 2026 -&nbsp;<a href="https://github.com/viratae">viratae</a></div>
        </div>
    </div>
    <div id="battlePage" class="hidden">
        <div class="header">
            <h1>MATCHUP #<span id="matchNumber">1</span></h1>
            <h3>Click the option you like the best!</h3>
        </div>
        <div id="matchContainer">
            <button class="match" id="leftButton">
                The Great Divide
            </button>
            <button class="match" id="rightButton">
                Porch Light
            </button>
        </div>
    </div>
    <div id="resultsPage" class="hidden">
        <h1>You ranked...</h1>
        <table id="table">
        </table>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
