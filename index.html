<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Rank</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.png">
</head>
<body>
    <div id="inputPage" class="">
        <div class="header">
            <h1>BLIND RANK</h1>
            <h3>Your <span class="italics">blind ranking</span></h3>
            <h3>Your <span class="italics">way</span></h3>
        </div>
        <div id="inputBox">
            <form id="rankForm" novalidate>
                <h4>First create a list to rank from by entering items separated by a comma</h4>
                <div class="errorBox">
                    <textarea placeholder="Billie Jean, Thriller, Beat It, Smooth Criminal, Man In the Mirror, Bad..." name="rankInput" id="rankInput" required></textarea>
                    <span class ="error" id="rankMessage">test</span>
                </div>
                <h4>Next enter how many items you want to blind rank (cannot exceed list size)</h4>
                <div class="errorBox">
                    <input type="number" min="1" max="100" id="numberInput" value="5">
                    <span class ="error" id="numberMessage"></span>
                </div>
                <button id="submitButton" type="submit">Rank These Items</button>
            </form>
            <div id="footer">© 2026 -&nbsp;<a href="https://github.com/viratae">viratae</a></div>
        </div>
    </div>
    <div id="rankPage" class="hidden">
        <div class="header">
            <h1>BLIND RANK #<span id="matchNumber">1</span></h1>
            <h3>Choose where to rank:</h3>
            <h2><span id="blindItem">Beat It</span></h2>
        </div>
        <div id="rankOptions">
           
        </div>
    </div>
    <div id="resultsPage" class="hidden">
        <h1>You ranked...</h1>
        <table id="table">
        </table>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
